name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  root-build:
    name: Root App - Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build root application
        run: npm run build

  mobile-lint-and-typecheck:
    name: Mobile - Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Run lint
        working-directory: ./mobile
        run: npm run lint

      - name: Type check
        working-directory: ./mobile
        run: npm run typecheck

  mobile-test:
    name: Mobile - Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Run tests
        working-directory: ./mobile
        run: npm test
